<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <g transform="translate(400, 195)">
    <!-- Incoming requests -->
    <g transform="translate(-250, -40)">
      <text x="0" y="-5" font-family="monospace" font-size="10" fill="#7a756e">requests</text>
      <line x1="0" y1="5" x2="0" y2="75" stroke="#c4a882" stroke-width="1" opacity="0.5"/>
      <circle cx="0" cy="15" r="3" fill="#b55a3c" opacity="0.4"/>
      <circle cx="0" cy="35" r="3" fill="#b55a3c" opacity="0.4"/>
      <circle cx="0" cy="55" r="3" fill="#b55a3c" opacity="0.4"/>
    </g>
    <!-- Arrow to Traefik -->
    <line x1="-230" y1="0" x2="-80" y2="0" stroke="#b55a3c" stroke-width="1.5"/>
    <polygon points="-80,-4 -68,0 -80,4" fill="#b55a3c"/>
    <!-- Traefik box -->
    <rect x="-65" y="-50" width="130" height="100" rx="6" fill="#ffffff" stroke="#3d7a8a" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#3d7a8a">traefik</text>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#7a756e">reverse proxy</text>
    <!-- Route lines -->
    <line x1="65" y1="-20" x2="160" y2="-60" stroke="#8b7355" stroke-width="1.5"/>
    <polygon points="160,-64 172,-60 160,-56" fill="#8b7355"/>
    <line x1="65" y1="0" x2="160" y2="0" stroke="#8b7355" stroke-width="1.5"/>
    <polygon points="160,-4 172,0 160,4" fill="#8b7355"/>
    <line x1="65" y1="20" x2="160" y2="60" stroke="#8b7355" stroke-width="1.5"/>
    <polygon points="160,56 172,60 160,64" fill="#8b7355"/>
    <!-- Services -->
    <rect x="175" y="-78" width="90" height="35" rx="3" fill="#ffffff" stroke="#c4a882" stroke-width="1"/>
    <text x="220" y="-56" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b7355">app:8080</text>
    <rect x="175" y="-18" width="90" height="35" rx="3" fill="#ffffff" stroke="#c4a882" stroke-width="1"/>
    <text x="220" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b7355">api:3000</text>
    <rect x="175" y="43" width="90" height="35" rx="3" fill="#ffffff" stroke="#c4a882" stroke-width="1"/>
    <text x="220" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b7355">web:443</text>
  </g>
</svg>

<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <g transform="translate(400, 195)">
    <!-- Terminal (Claude Code) -->
    <g transform="translate(-150, 0)">
      <rect x="-90" y="-55" width="180" height="110" rx="6" fill="#2a2825" stroke="#3d7a8a" stroke-width="1.5"/>
      <rect x="-90" y="-55" width="180" height="20" rx="6" fill="#3a3735"/>
      <rect x="-90" y="-42" width="180" height="7" fill="#3a3735"/>
      <circle cx="-74" cy="-45" r="4" fill="#b55a3c" opacity="0.7"/>
      <circle cx="-60" cy="-45" r="4" fill="#c4a882" opacity="0.7"/>
      <circle cx="-46" cy="-45" r="4" fill="#6a9aaa" opacity="0.7"/>
      <text x="-70" y="-15" font-family="monospace" font-size="9" fill="#6a9aaa">$</text>
      <text x="-58" y="-15" font-family="monospace" font-size="9" fill="#d4cfca">claude</text>
      <text x="-70" y="2" font-family="monospace" font-size="9" fill="#c4a882">? What do you</text>
      <text x="-70" y="16" font-family="monospace" font-size="9" fill="#c4a882">  want to build?</text>
      <rect x="-70" y="26" width="6" height="11" fill="#b55a3c" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="#3d7a8a">Claude Code</text>
    </g>
    <!-- VS -->
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#b55a3c">vs</text>
    <!-- Editor (Cursor) -->
    <g transform="translate(150, 0)">
      <rect x="-90" y="-55" width="180" height="110" rx="6" fill="#ffffff" stroke="#c4a882" stroke-width="1.5"/>
      <rect x="-90" y="-55" width="180" height="20" rx="6" fill="#e8e4df"/>
      <rect x="-90" y="-42" width="180" height="7" fill="#e8e4df"/>
      <circle cx="-74" cy="-45" r="4" fill="#b55a3c" opacity="0.5"/>
      <circle cx="-60" cy="-45" r="4" fill="#c4a882" opacity="0.5"/>
      <circle cx="-46" cy="-45" r="4" fill="#6a9aaa" opacity="0.5"/>
      <!-- Sidebar -->
      <rect x="-90" y="-35" width="35" height="90" fill="#f5f2ed"/>
      <rect x="-82" y="-25" width="20" height="5" rx="1" fill="#c4a882" opacity="0.3"/>
      <rect x="-82" y="-15" width="16" height="5" rx="1" fill="#c4a882" opacity="0.2"/>
      <rect x="-82" y="-5" width="22" height="5" rx="1" fill="#c4a882" opacity="0.2"/>
      <rect x="-82" y="5" width="18" height="5" rx="1" fill="#c4a882" opacity="0.2"/>
      <!-- Code lines -->
      <rect x="-48" y="-25" width="60" height="5" rx="1" fill="#2c2a27" opacity="0.12"/>
      <rect x="-48" y="-15" width="80" height="5" rx="1" fill="#2c2a27" opacity="0.08"/>
      <rect x="-48" y="-5" width="55" height="5" rx="1" fill="#2c2a27" opacity="0.08"/>
      <rect x="-48" y="5" width="70" height="5" rx="1" fill="#3d7a8a" opacity="0.15"/>
      <rect x="-48" y="15" width="45" height="5" rx="1" fill="#2c2a27" opacity="0.08"/>
      <rect x="-48" y="25" width="65" height="5" rx="1" fill="#2c2a27" opacity="0.08"/>
      <rect x="-48" y="35" width="50" height="5" rx="1" fill="#2c2a27" opacity="0.08"/>
      <text x="0" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b7355">Cursor</text>
    </g>
  </g>
</svg>

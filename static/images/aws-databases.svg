<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <!-- Left database (Aurora) -->
  <g transform="translate(250, 120)">
    <ellipse cx="0" cy="0" rx="55" ry="18" fill="#ffffff" stroke="#3d7a8a" stroke-width="2"/>
    <rect x="-55" y="0" width="110" height="80" fill="#ffffff" stroke="#3d7a8a" stroke-width="2"/>
    <ellipse cx="0" cy="80" rx="55" ry="18" fill="#ffffff" stroke="#3d7a8a" stroke-width="2"/>
    <ellipse cx="0" cy="40" rx="55" ry="18" fill="none" stroke="#3d7a8a" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="130" text-anchor="middle" font-family="monospace" font-size="14" fill="#3d7a8a">Aurora</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(370, 160)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#b55a3c" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="30" y="-12" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#b55a3c">vs</text>
  </g>
  <!-- Right database (Redshift) -->
  <g transform="translate(550, 120)">
    <ellipse cx="0" cy="0" rx="55" ry="18" fill="#ffffff" stroke="#8b7355" stroke-width="2"/>
    <rect x="-55" y="0" width="110" height="80" fill="#ffffff" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="0" cy="80" rx="55" ry="18" fill="#ffffff" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="0" cy="40" rx="55" ry="18" fill="none" stroke="#8b7355" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="130" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b7355">Redshift</text>
  </g>
</svg>

<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <!-- Terminal window -->
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="400" height="240" rx="6" fill="#2a2825" stroke="#8b7355" stroke-width="1.5"/>
    <rect x="0" y="0" width="400" height="28" rx="6" fill="#3a3735"/>
    <rect x="0" y="20" width="400" height="8" fill="#3a3735"/>
    <circle cx="18" cy="14" r="5" fill="#b55a3c" opacity="0.8"/>
    <circle cx="36" cy="14" r="5" fill="#c4a882" opacity="0.8"/>
    <circle cx="54" cy="14" r="5" fill="#6a9aaa" opacity="0.8"/>
    <!-- Terminal text -->
    <text x="20" y="60" font-family="monospace" font-size="13" fill="#8b7355">~</text>
    <text x="35" y="60" font-family="monospace" font-size="13" fill="#6a9aaa">$</text>
    <text x="55" y="60" font-family="monospace" font-size="13" fill="#d4cfca">echo "hello, world"</text>
    <text x="20" y="82" font-family="monospace" font-size="13" fill="#c4a882">hello, world</text>
    <text x="20" y="110" font-family="monospace" font-size="13" fill="#8b7355">~</text>
    <text x="35" y="110" font-family="monospace" font-size="13" fill="#6a9aaa">$</text>
    <text x="55" y="110" font-family="monospace" font-size="13" fill="#d4cfca">cat first-post.md</text>
    <text x="20" y="140" font-family="monospace" font-size="13" fill="#c4a882">---</text>
    <text x="20" y="160" font-family="monospace" font-size="13" fill="#c4a882">title: My First Post</text>
    <text x="20" y="180" font-family="monospace" font-size="13" fill="#c4a882">---</text>
    <text x="20" y="210" font-family="monospace" font-size="13" fill="#8b7355">~</text>
    <text x="35" y="210" font-family="monospace" font-size="13" fill="#6a9aaa">$</text>
    <rect x="55" y="198" width="8" height="16" fill="#b55a3c" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>

    <rect x="30" y="164" width="340" height="8" rx="2" fill="#2c2a27" opacity="0.07"/>
    <rect x="30" y="180" width="280" height="8" rx="2" fill="#2c2a27" opacity="0.07"/>
    <rect x="30" y="196" width="310" height="8" rx="2" fill="#2c2a27" opacity="0.07"/>
    <text x="340" y="238" font-family="monospace" font-size="11" fill="#3d7a8a" opacity="0.4">v2.0</text>

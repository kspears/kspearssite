<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <g transform="translate(400, 180)">
    <!-- Envelope -->
    <rect x="-80" y="-40" width="160" height="100" rx="4" fill="#ffffff" stroke="#8b7355" stroke-width="2"/>
    <polyline points="-80,-40 0,20 80,-40" fill="none" stroke="#8b7355" stroke-width="2"/>
    <line x1="-80" y1="60" x2="-15" y2="10" stroke="#8b7355" stroke-width="1" opacity="0.3"/>
    <line x1="80" y1="60" x2="15" y2="10" stroke="#8b7355" stroke-width="1" opacity="0.3"/>
    <!-- Server rack behind -->
    <rect x="110" y="-60" width="80" height="140" rx="4" fill="#ffffff" stroke="#3d7a8a" stroke-width="1.5"/>
    <line x1="115" y1="-30" x2="185" y2="-30" stroke="#3d7a8a" stroke-width="1" opacity="0.4"/>
    <line x1="115" y1="0" x2="185" y2="0" stroke="#3d7a8a" stroke-width="1" opacity="0.4"/>
    <line x1="115" y1="30" x2="185" y2="30" stroke="#3d7a8a" stroke-width="1" opacity="0.4"/>
    <circle cx="175" cy="-45" r="3" fill="#b55a3c" opacity="0.5"/>
    <circle cx="175" cy="-15" r="3" fill="#b55a3c" opacity="0.5"/>
    <circle cx="175" cy="15" r="3" fill="#3d7a8a" opacity="0.5"/>
    <circle cx="175" cy="45" r="3" fill="#3d7a8a" opacity="0.5"/>
    <!-- Connection -->
    <line x1="80" y1="10" x2="110" y2="10" stroke="#c4a882" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Year label -->
    <text x="0" y="100" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b7355">self-hosted mail</text>
  </g>
</svg>

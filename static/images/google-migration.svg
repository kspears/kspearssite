<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <g transform="translate(400, 185)">
    <!-- Google side -->
    <g transform="translate(-140, 0)">
      <rect x="-65" y="-50" width="130" height="100" rx="4" fill="#ffffff" stroke="#c4a882" stroke-width="1.5"/>
      <text x="0" y="-20" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4a882">Gmail</text>
      <text x="0" y="-5" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4a882">Drive</text>
      <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4a882">Calendar</text>
      <text x="0" y="25" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4a882">Docs</text>
      <text x="0" y="70" text-anchor="middle" font-family="monospace" font-size="10" fill="#7a756e">Google Workspace</text>
      <!-- X through it -->
      <line x1="-55" y1="-40" x2="55" y2="40" stroke="#b55a3c" stroke-width="1.5" opacity="0.4"/>
      <line x1="55" y1="-40" x2="-55" y2="40" stroke="#b55a3c" stroke-width="1.5" opacity="0.4"/>
    </g>
    <!-- Arrow -->
    <line x1="-10" y1="0" x2="50" y2="0" stroke="#b55a3c" stroke-width="2"/>
    <polygon points="50,-5 62,0 50,5" fill="#b55a3c"/>
    <!-- Self-hosted side -->
    <g transform="translate(140, 0)">
      <rect x="-65" y="-50" width="130" height="100" rx="4" fill="#ffffff" stroke="#3d7a8a" stroke-width="1.5"/>
      <text x="0" y="-20" text-anchor="middle" font-family="monospace" font-size="11" fill="#3d7a8a">Mailcow</text>
      <text x="0" y="-5" text-anchor="middle" font-family="monospace" font-size="11" fill="#3d7a8a">Nextcloud</text>
      <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="11" fill="#3d7a8a">Radicale</text>
      <text x="0" y="25" text-anchor="middle" font-family="monospace" font-size="11" fill="#3d7a8a">Docs</text>
      <text x="0" y="70" text-anchor="middle" font-family="monospace" font-size="10" fill="#7a756e">Self-Hosted</text>
    </g>
  </g>
</svg>

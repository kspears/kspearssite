<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>
  <!-- Badge -->
  <g transform="translate(400, 185)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#c4a882" stroke-width="2"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#c4a882" stroke-width="1" stroke-dasharray="4,6"/>
    <!-- Inner shield -->
    <path d="M0,-55 L40,-35 L40,10 Q40,45 0,55 Q-40,45 -40,10 L-40,-35 Z" fill="#3d7a8a" fill-opacity="0.08" stroke="#3d7a8a" stroke-width="1.5"/>
    <!-- Check mark -->
    <polyline points="-15,5 -5,15 18,-10" fill="none" stroke="#b55a3c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Ribbon tails -->
    <path d="M-30,70 L-45,110 L-25,95 L-15,115" fill="none" stroke="#c4a882" stroke-width="2" stroke-linecap="round"/>
    <path d="M30,70 L45,110 L25,95 L15,115" fill="none" stroke="#c4a882" stroke-width="2" stroke-linecap="round"/>
    <!-- Text -->
    <text x="0" y="-100" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b7355">AWS CERTIFIED</text>
    <text x="0" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b7355">Solutions Architect Pro</text>
  </g>
</svg>
